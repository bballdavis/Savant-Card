<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Savant Energy Breaker Board Demo</title>
    <script type="module" src="/src/index.ts"></script>
    <script type="module">
      import { createMockHass } from "./mock-hass.ts";

      const hass = createMockHass();
      const configs = {
        loaded: {
          type: "custom:savant-energy-breaker-board-card",
          title: "Electrical Panel",
          breaker_overrides: {
            "device:breaker_7": { show_controls: false },
          },
        },
        compact: {
          type: "custom:savant-energy-breaker-board-card",
          title: "Compact Board",
          layout: { density: "compact", sort_by: "current_power_descending" },
        },
        empty: {
          type: "custom:savant-energy-breaker-board-card",
          title: "No Breakers",
          discovery: { enabled: false },
        },
      };

      window.addEventListener("DOMContentLoaded", () => {
        const savedTheme = localStorage.getItem("savant-demo-theme") ?? "dark";
        document.documentElement.dataset.theme = savedTheme;
        document.querySelector("[data-theme-toggle]").textContent =
          savedTheme === "light" ? "Use dark mode" : "Use light mode";

        document.querySelector("[data-theme-toggle]").addEventListener("click", () => {
          const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
          document.documentElement.dataset.theme = next;
          localStorage.setItem("savant-demo-theme", next);
          document.querySelector("[data-theme-toggle]").textContent =
            next === "light" ? "Use dark mode" : "Use light mode";
        });

        for (const card of document.querySelectorAll("savant-energy-breaker-board-card")) {
          card.hass = hass;
          card.setConfig(configs[card.dataset.config]);
        }
      });
    </script>
    <style>
      :root {
        --primary-text-color: #f7f9fb;
        --secondary-text-color: #a9b0b7;
        --ha-card-background: #151a1d;
        --card-background-color: #151a1d;
        --secondary-background-color: #23292d;
        --divider-color: #3a4248;
        --success-color: #79c84f;
        --warning-color: #ff8a1d;
        --error-color: #ff594c;
        --disabled-text-color: #8b9298;
        --ha-card-border-radius: 16px;
        color-scheme: dark;
      }

      :root[data-theme="light"] {
        --primary-text-color: #15191c;
        --secondary-text-color: #5d6670;
        --ha-card-background: #f8fafb;
        --card-background-color: #f8fafb;
        --secondary-background-color: #eef2f4;
        --divider-color: #cad1d7;
        --success-color: #4f9d35;
        --warning-color: #e07012;
        --error-color: #c93c32;
        --disabled-text-color: #8b9298;
        color-scheme: light;
      }

      body {
        margin: 0;
        padding: 24px;
        color: var(--primary-text-color);
        background: var(--demo-page-background, #0d1012);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      :root[data-theme="light"] body {
        --demo-page-background: #eef1f3;
      }

      h1,
      h2 {
        letter-spacing: 0;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 18px;
      }

      .theme-toggle {
        padding: 8px 10px;
        border: 1px solid var(--divider-color);
        border-radius: 999px;
        color: var(--primary-text-color);
        background: var(--secondary-background-color);
        cursor: pointer;
      }

      .demo-grid {
        display: grid;
        gap: 28px;
      }

      .demo-width {
        padding: 16px;
        border: 1px solid var(--divider-color);
        border-radius: 16px;
      }

      .wide {
        max-width: 1180px;
      }

      .tablet {
        max-width: 720px;
      }

      .phone {
        max-width: 420px;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <h1>Savant Energy Breaker Board Card</h1>
      <button class="theme-toggle" data-theme-toggle type="button">Use light mode</button>
    </div>
    <div class="demo-grid">
      <section class="demo-width wide">
        <h2>Desktop standard grid</h2>
        <savant-energy-breaker-board-card data-config="loaded"></savant-energy-breaker-board-card>
      </section>
      <section class="demo-width phone">
        <h2>Mobile stacked container</h2>
        <savant-energy-breaker-board-card data-config="loaded"></savant-energy-breaker-board-card>
      </section>
      <section class="demo-width tablet">
        <h2>Compact density</h2>
        <savant-energy-breaker-board-card data-config="compact"></savant-energy-breaker-board-card>
      </section>
      <section class="demo-width wide">
        <h2>Empty state</h2>
        <savant-energy-breaker-board-card data-config="empty"></savant-energy-breaker-board-card>
      </section>
    </div>
  </body>
</html>
